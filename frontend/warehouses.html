<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Warehouses | Celesté & Co.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <script src="js/api.js"></script>
    <script>
        Auth.requireLogin();
        const currentUser = Auth.getUser();
        
        if (currentUser.role !== 'Superadmin') {
            alert("Security Alert: You do not have clearance to manage facilities.");
            window.location.replace('dashboard.html');
        }

        let globalWarehouses = [];
    </script>

    <style>
        :root {
            --dark-sidebar: #0B0E14;
            --bg-body: #F4F7FE;
        }
        body { background-color: var(--bg-body); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        
        /* Sidebar matches dashboard */
        .sidebar { width: 260px; height: 100vh; background: var(--dark-sidebar); position: fixed; padding: 25px; color: white; z-index: 1000; }
        .sidebar .nav-link { color: #8B949E; padding: 12px; border-radius: 10px; margin-bottom: 8px; transition: 0.2s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #1C212C; color: #FFFFFF; }
        
        .main-content { margin-left: 260px; padding: 30px; }
        
        /* Warehouse Card Styling */
        .zone-card { background: white; border-radius: 20px; border: none; padding: 25px; transition: transform 0.2s; height: 100%; }
        .zone-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .zone-icon { width: 60px; height: 60px; background: #E9EFFF; color: #4318FF; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="fw-bold mb-5">CELESTÉ & CO.</h4>
    <nav class="nav flex-column">
        <a class="nav-link" href="dashboard.html"><i class="bi bi-grid-fill me-3"></i> Dashboard</a>
        <a class="nav-link" href="orders.html"><i class="bi bi-cart-fill me-3"></i> Orders & POS</a>
        <a class="nav-link" href="customers.html"><i class="bi bi-star-fill me-3"></i> VIP Customers</a>
        <a class="nav-link" href="products.html"><i class="bi bi-bag-fill me-3"></i> Products</a>
        <a class="nav-link active" href="warehouses.html"><i class="bi bi-buildings-fill me-3"></i> Warehouse</a>
        <a class="nav-link" href="supervisors.html"><i class="bi bi-people-fill me-3"></i> Supervisors</a>
    </nav>
    <div class="position-absolute bottom-0 mb-4" style="width: 210px;">
        <a href="#" onclick="performLogout(event)" class="nav-link text-danger"><i class="bi bi-box-arrow-right me-3"></i> Log out</a>
    </div>
</div>

<div class="main-content">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-dark">Warehouse Management</h3>
        <div class="d-flex align-items-center bg-white p-2 px-3 rounded-pill shadow-sm">
            <span class="fw-bold me-2" style="color: #2B3674;" id="display-name">Loading...</span>
            <img id="display-avatar" src="" width="35" class="rounded-circle">
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <p class="text-muted mb-0">Manage all Celesté & Co. storage facilities and zones.</p>
        <button class="btn text-white fw-bold px-4 rounded-pill shadow-sm" style="background-color: #4318FF;" data-bs-toggle="modal" data-bs-target="#addWarehouseModal">
            <i class="bi bi-plus-lg me-2"></i> Add Warehouse
        </button>
    </div>

    <div id="page-alert" class="alert d-none shadow-sm rounded-3 border-0 mb-4"></div>

    <div class="row g-4" id="warehouses-grid">
        <div class="col-12 text-center py-5 text-muted">Loading facilities...</div>
    </div>

</div>

<div class="modal fade" id="addWarehouseModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow" style="border-radius: 20px;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" style="color: #2B3674;">Register New Warehouse</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="addForm">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Zone / Warehouse Name</label>
                        <input type="text" id="add_name" class="form-control rounded-3" placeholder="e.g., Zone 8" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">Full Address</label>
                        <textarea id="add_address" class="form-control rounded-3" rows="3" placeholder="Enter physical location..." required></textarea>
                    </div>
                    <button type="submit" id="addBtn" class="btn text-white w-100 fw-bold rounded-pill py-2" style="background-color: #4318FF;">Save Facility</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editWarehouseModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow" style="border-radius: 20px;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" style="color: #2B3674;">Edit Warehouse Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="editForm">
                    <input type="hidden" id="edit_id">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Warehouse Name</label>
                        <input type="text" id="edit_name" class="form-control rounded-3" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">Full Address</label>
                        <textarea id="edit_address" class="form-control rounded-3" rows="3" required></textarea>
                    </div>
                    <button type="submit" id="editBtn" class="btn text-white w-100 fw-bold rounded-pill py-2" style="background-color: #4318FF;">Update Facility</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        
        // Setup User Profile
        document.getElementById('display-name').innerText = currentUser.fullname;
        document.getElementById('display-avatar').src = `https://ui-avatars.com/api/?name=${currentUser.fullname}&background=4318FF&color=fff`;

        // Load initial data
        loadWarehouses();

        // 1. ADD Form Logic
        document.getElementById('addForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('addBtn');
            btn.innerHTML = "Processing..."; btn.disabled = true;

            const payload = {
                user_id: currentUser.id,
                warehouse_name: document.getElementById('add_name').value,
                address: document.getElementById('add_address').value
            };

            fetch(`${API_BASE_URL}/warehouses`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    bootstrap.Modal.getInstance(document.getElementById('addWarehouseModal')).hide();
                    document.getElementById('addForm').reset();
                    showAlert("New facility registered successfully.", "success");
                    loadWarehouses(); 
                } else {
                    showAlert(data.message || "Failed to register facility.", "danger");
                }
                btn.innerHTML = "Save Facility"; btn.disabled = false;
            });
        });

        // 2. EDIT Form Logic
        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('editBtn');
            btn.innerHTML = "Saving..."; btn.disabled = true;

            const id = document.getElementById('edit_id').value;
            const payload = {
                user_id: currentUser.id,
                warehouse_name: document.getElementById('edit_name').value,
                address: document.getElementById('edit_address').value
            };

            fetch(`${API_BASE_URL}/warehouses/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    bootstrap.Modal.getInstance(document.getElementById('editWarehouseModal')).hide();
                    showAlert("Facility details updated.", "success");
                    loadWarehouses(); 
                } else {
                    showAlert(data.message || "Failed to update facility.", "danger");
                }
                btn.innerHTML = "Update Facility"; btn.disabled = false;
            });
        });
    });

    // Fetch & Build Grid
    function loadWarehouses() {
        fetch(`${API_BASE_URL}/warehouses`)
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    globalWarehouses = res.data;
                    const grid = document.getElementById('warehouses-grid');
                    grid.innerHTML = '';

                    if(globalWarehouses.length === 0) {
                        grid.innerHTML = `
                            <div class="col-12 text-center py-5">
                                <div class="text-muted mb-3"><i class="bi bi-buildings" style="font-size: 3rem;"></i></div>
                                <h5 class="fw-bold text-dark">No Warehouses Found</h5>
                                <p class="text-muted">Click the "Add Warehouse" button above to register your first facility.</p>
                            </div>
                        `;
                        return;
                    }

                    globalWarehouses.forEach(wh => {
                        let totalItemsFormatted = parseFloat(wh.total_items).toLocaleString('en-US');
                        let managerName = wh.manager_name || 'Unassigned';

                        grid.innerHTML += `
                            <div class="col-md-4">
                                <div class="card zone-card shadow-sm">
                                    <div class="d-flex justify-content-between align-items-start mb-4">
                                        <div class="zone-icon"><i class="bi bi-building"></i></div>
                                        <div class="dropdown">
                                            <button class="btn btn-sm btn-light border-0" type="button" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
                                            <ul class="dropdown-menu border-0 shadow-sm">
                                                <li><a class="dropdown-item text-primary" href="#" onclick="openEditModal(${wh.id})"><i class="bi bi-pencil me-2"></i>Edit</a></li>
                                                <li><a class="dropdown-item text-danger" href="#" onclick="deleteWarehouse(${wh.id}, '${wh.warehouse_name.replace(/'/g, "\\'")}')"><i class="bi bi-trash me-2"></i>Delete</a></li>
                                            </ul>
                                        </div>
                                    </div>
                                    
                                    <h5 class="fw-bold mb-1" style="color: #2B3674;">${wh.warehouse_name}</h5>
                                    <p class="text-muted small mb-4"><i class="bi bi-geo-alt-fill me-1"></i> ${wh.address}</p>
                                    
                                    <div class="d-flex justify-content-between align-items-center border-top pt-3 mt-auto">
                                        <div>
                                            <small class="text-muted d-block">Supervisor</small>
                                            <span class="fw-bold text-dark" style="font-size: 0.9rem;">${managerName}</span>
                                        </div>
                                        <div class="text-end">
                                            <small class="text-muted d-block">Total Items</small>
                                            <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 px-2 py-1">
                                                ${totalItemsFormatted} pcs
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
            });
    }

    // Modal Trigger
    function openEditModal(id) {
        const wh = globalWarehouses.find(w => w.id === id);
        if(wh) {
            document.getElementById('edit_id').value = wh.id;
            document.getElementById('edit_name').value = wh.warehouse_name;
            document.getElementById('edit_address').value = wh.address;
            new bootstrap.Modal(document.getElementById('editWarehouseModal')).show();
        }
    }

    // Delete Logic
    function deleteWarehouse(id, name) {
        if(confirm(`Are you sure you want to delete ${name}? All products in this zone will become unassigned.`)) {
            fetch(`${API_BASE_URL}/warehouses/${id}?user_id=${currentUser.id}`, { method: 'DELETE' })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    showAlert("Facility decommissioned successfully.", "success");
                    loadWarehouses(); 
                }
            });
        }
    }

    // Utility 
    function showAlert(msg, type) {
        const box = document.getElementById('page-alert');
        box.className = `alert alert-${type} alert-dismissible fade show border-0 shadow-sm rounded-3 mb-4`;
        box.innerHTML = `<i class="bi bi-info-circle-fill me-2"></i> ${msg} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
    }
</script>

</body>
</html>
