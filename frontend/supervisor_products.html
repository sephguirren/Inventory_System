<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Inventory | Celesté & Co.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <script src="js/api.js"></script>
    <script>
        Auth.requireLogin();
        const currentUser = Auth.getUser();
        
        // Bouncer: Superadmins should use the global products page
        if (currentUser.role === 'Superadmin') {
            window.location.replace('products.html');
        }
    </script>

    <style>
        :root { --dark-sidebar: #0B0E14; --bg-body: #F4F7FE; }
        body { background-color: var(--bg-body); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .sidebar { width: 260px; height: 100vh; background: var(--dark-sidebar); position: fixed; padding: 25px; color: white; z-index: 1000; }
        .sidebar .nav-link { color: #8B949E; padding: 12px; border-radius: 10px; margin-bottom: 8px; transition: 0.2s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #1C212C; color: #FFFFFF; }
        .main-content { margin-left: 260px; padding: 30px; }
        .table-card { background: white; border-radius: 20px; border: none; padding: 25px; }
        .table-custom thead { color: #A3AED0; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .table-custom tbody { font-size: 14px; font-weight: 600; color: #2B3674; }
        
        .badge-instock { background: #E2FBF0; color: #05CD99; padding: 6px 12px; border-radius: 8px; font-weight: bold; }
        .badge-lowstock { background: #FFF8E5; color: #FFB547; padding: 6px 12px; border-radius: 8px; font-weight: bold; }
        .badge-outstock { background: #FFEAF1; color: #EE5D50; padding: 6px 12px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="fw-bold mb-5">CELESTÉ & CO.</h4>
    <nav class="nav flex-column">
        <a class="nav-link" href="supervisor_dashboard.html"><i class="bi bi-grid-fill me-3"></i> My Dashboard</a>
        <a class="nav-link" href="supervisor_orders.html"><i class="bi bi-cart-fill me-3"></i> My Orders</a>
        <a class="nav-link active" href="supervisor_products.html"><i class="bi bi-bag-fill me-3"></i> My Inventory</a>
    </nav>
    <div class="position-absolute bottom-0 mb-4" style="width: 210px;">
        <a href="#" onclick="performLogout(event)" class="nav-link text-danger"><i class="bi bi-box-arrow-right me-3"></i> Log out</a>
    </div>
</div>

<div class="main-content">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-dark">Zone Inventory</h3>
        <div class="d-flex align-items-center bg-white p-2 px-3 rounded-pill shadow-sm">
            <span class="fw-bold me-2" style="color: #2B3674;" id="display-name">Loading...</span>
            <img id="display-avatar" src="" width="35" class="rounded-circle">
        </div>
    </div>

    <div class="table-card shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h5 class="fw-bold mb-0" style="color: #2B3674;">My Assigned Products</h5>
                <p class="text-muted small mb-0">View-only access for local zone stock.</p>
            </div>
        </div>
        
        <div class="table-responsive">
            <table class="table table-custom table-hover align-middle">
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Selling Price</th>
                        <th>Stock Quantity</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="products-tbody">
                    <tr><td colspan="5" class="text-center py-5 text-muted">Loading local inventory...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        
        // 1. Set Profile Info
        document.getElementById('display-name').innerText = currentUser.fullname;
        document.getElementById('display-avatar').src = `https://ui-avatars.com/api/?name=${currentUser.fullname}&background=4318FF&color=fff`;

        // 2. Fetch Zone-Specific Products
        fetch(`${API_BASE_URL}/products?role=${currentUser.role}&warehouse_id=${currentUser.warehouse_id}`)
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    const tbody = document.getElementById('products-tbody');
                    tbody.innerHTML = '';

                    if(res.data.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-muted">No inventory currently assigned to your zone.</td></tr>`;
                        return;
                    }

                    res.data.forEach(p => {
                        // Stock Badge Logic
                        let stockBadge = p.stock_quantity > 20 ? `<span class="badge-instock">In Stock</span>` : 
                                         p.stock_quantity > 0 ? `<span class="badge-lowstock">Low Stock</span>` : 
                                         `<span class="badge-outstock">Out of Stock</span>`;

                        tbody.innerHTML += `
                            <tr>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="bg-light rounded p-2 me-3 text-primary"><i class="bi bi-box-fill"></i></div>
                                        <div>
                                            <span class="fw-bold text-dark d-block">${p.product_name}</span>
                                            <small class="text-muted" style="font-size: 0.75rem;">SKU: ${p.sku}</small>
                                        </div>
                                    </div>
                                </td>
                                <td><span class="text-muted">${p.category}</span></td>
                                <td>₱${parseFloat(p.sale_price).toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                                <td>${p.stock_quantity} pcs</td>
                                <td>${stockBadge}</td>
                            </tr>
                        `;
                    });
                }
            })
            .catch(err => {
                console.error("Failed to fetch products:", err);
                document.getElementById('products-tbody').innerHTML = `<tr><td colspan="5" class="text-center text-danger py-5">Failed to load inventory data.</td></tr>`;
            });
    });
</script>

</body>
</html>
