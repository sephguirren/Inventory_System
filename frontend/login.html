<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Celesté & Co. - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .login-card { border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; max-width: 900px; margin: auto; }
        .btn-login { background-color: #74b9ff; color: white; border: none; width: 100px; }
        .form-control { border: none; border-bottom: 1px solid #ccc; border-radius: 0; padding-left: 30px; }
        .input-group-text { background: transparent; border: none; position: absolute; left: 0; z-index: 10; }
    </style>
</head>
<body>
    <div class="container login-card">
        <div class="row">
            <div class="col-md-6 d-none d-md-block p-5 text-center">
                <img src="img/login.jpg" class="img-fluid" alt="Illustration">
            </div>
            <div class="col-md-6 p-5">
                <h2 class="mb-4 fw-bold">Sign up</h2>
                
                <div id="error-alert" class="alert alert-danger d-none small py-2 mb-3">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> <span id="error-message"></span>
                </div>

                <form id="loginForm">
                    <div class="mb-4 position-relative">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" id="username" class="form-control" placeholder="Your Name" required>
                    </div>
                    <div class="mb-4 position-relative">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="password" class="form-control" placeholder="Password" required>
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label text-muted" for="remember">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-login" id="loginBtn">Log in</button>
                </form>
            </div>
        </div>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('loginBtn');
        btn.innerHTML = "Authenticating..."; 
        btn.disabled = true;

        const payload = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        // Send login request to your new Python API
        fetch('http://127.0.0.1:5000/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                // 1. Save the user's digital ID badge
                localStorage.setItem('celeste_user', JSON.stringify(data.user));
                
                // 2. THE TRAFFIC COP: Route them based on their exact role!
                if (data.user.role === 'Superadmin') {
                    window.location.replace('dashboard.html'); 
                } else {
                    // Everyone else (Admins/Supervisors) goes to the zone dashboard
                    window.location.replace('supervisor_dashboard.html'); 
                }
            } else {
                // Show error message (Invalid password, etc.)
                const alertBox = document.getElementById('login-alert');
                if(alertBox) {
                    alertBox.classList.remove('d-none');
                    alertBox.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i> ${data.message}`;
                } else {
                    alert(data.message);
                }
                btn.innerHTML = "Sign In"; 
                btn.disabled = false;
            }
        })
        .catch(err => {
            console.error("API Error:", err);
            alert("Could not connect to the server. Is app.py running?");
            btn.innerHTML = "Sign In"; 
            btn.disabled = false;
        });
    });
</script>
</body>
</html>
